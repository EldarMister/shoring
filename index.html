    <!-- Performance hints: preconnect to the Encar CDN that serves car photos
         (LCP element on every detail page) plus dns-prefetch fallback for
         older browsers. Saves 100-300ms of TCP+TLS on the first image. -->

    <link rel="dns-prefetch" href="https://ci.encar.com" />

    <link rel="dns-prefetch" href="https://img2.encar.com" />

         doesn't synthesize alternate language URLs on its own. -->
    <link rel="alternate" hreflang="ru" href="https://avt-autovtrade.com/" />
    <link rel="alternate" hreflang="x-default" href="https://avt-autovtrade.com/" />

    />
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem('tlv-theme')
          const resolvedTheme = savedTheme === 'dark' ? 'dark' : 'light'
          document.documentElement.setAttribute('data-theme', resolvedTheme)
          document.documentElement.style.colorScheme = resolvedTheme
        } catch {
          document.documentElement.setAttribute('data-theme', 'light')
          document.documentElement.style.colorScheme = 'light'
        }
      })()
    </script>
